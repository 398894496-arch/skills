name: Improve Codebase Architecture

on:
  schedule:
    # 11:17 UTC weekdays = 06:17 CT. Off-the-hour + pre-peak slot to reduce GitHub cron delay.
    - cron: "17 11 * * 1-5"
  workflow_dispatch:

# This workflow is the thin **workflow envelope** (ADR 0014): cron, permissions,
# tokens, tool scoping, and a clone-and-invoke body. The drift-prone logic — the
# stream-json cost scrape and the <output>/<body> publish seam — lives in the
# fetched-fresh **proposal-loop harness** (`harness/cli.py`), not inline here, so
# one fix reaches every loop. In *this* repo the harness arrives with the
# `ref: main` checkout (the checkout IS the fresh harness); a downstream repo
# instead clones dividedby/skills into a temp dir — see
# docs/onboarding/proposal-loop-harness.md.

jobs:
  improve-codebase-architecture:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: improve-codebase-architecture
      cancel-in-progress: false
    permissions:
      contents: read
      issues: write

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      LABEL: source:architecture-review

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Install Claude Code
        run: |
          set -euo pipefail
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install /improve-codebase-architecture skill
        run: |
          set -euo pipefail
          tmp=$(mktemp -d)
          git clone --depth 1 https://github.com/mattpocock/skills.git "$tmp/mattpocock-skills"
          mkdir -p ~/.claude/skills
          cp -R "$tmp/mattpocock-skills/skills/engineering/improve-codebase-architecture" ~/.claude/skills/
          test -f ~/.claude/skills/improve-codebase-architecture/SKILL.md
          echo "Installed skill from mattpocock/skills@$(git -C "$tmp/mattpocock-skills" rev-parse --short HEAD)"

      - name: Run /improve-codebase-architecture
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          # The agent is read-only: it explores, decides, and emits a single
          # <output> JSON block plus a raw <body> block (see prompt). It does NOT
          # file the issue — the Publish step does, via the harness, which enforces
          # the one-issue-per-run cap and the label in code. gh access is scoped to
          # read-only subcommands so the agent *cannot* create an issue itself.
          # --output-format stream-json --verbose: stream every event so a hung run
          # leaves a trace (plain json buffers) and the final result event (with
          # total_cost_usd) lands before claude exits — cost captured even on failure.
          # pipefail propagates an agent failure; the Digest step still runs (always).
          claude -p \
            --output-format stream-json --verbose \
            --permission-mode acceptEdits \
            --allowedTools "Bash(gh issue list:*) Bash(gh issue view:*) Bash(gh search:*) Bash(gh api:*) Bash(git:*) Read Grep Glob WebSearch WebFetch" \
            --append-system-prompt "$(cat harness/prompts/improve-codebase-architecture.md)" \
            "Run the daily architecture-review pass. Follow the instructions in the system prompt." \
            | tee "$RUNNER_TEMP/agent.jsonl"

      - name: Digest the run (result log + cost ledger)
        if: always()
        run: |
          set -euo pipefail
          # JSONL -> clean result text + the total_cost_usd=… ledger line the
          # cross-repo cost hub scrapes. Best-effort by construction (exit 0 even
          # with no result event), so it runs on a failed agent run too.
          python3 harness/cli.py digest \
            --jsonl "$RUNNER_TEMP/agent.jsonl" \
            --result-out "$RUNNER_TEMP/agent.log" \
            --cost-out "$RUNNER_TEMP/agent.cost"

      - name: Publish proposal
        id: publish
        run: |
          set -euo pipefail
          # Parse <output>/<body>, file <=1 labeled issue, write the rich step
          # summary, emit issue_url. Fails loudly (exit 1) on a missing/garbled
          # block — the failure() Summarise step below then surfaces the raw log.
          python3 harness/cli.py publish \
            --log "$RUNNER_TEMP/agent.log" \
            --label "$LABEL" \
            --label-description "Issues proposed by the automated architecture-review workflow" \
            --cost-file "$RUNNER_TEMP/agent.cost" \
            --heading "Architecture review"

      - name: Summarise a failed run
        if: failure()
        run: |
          {
            echo "## Architecture review"
            echo ""
            echo "**Cost:** $(cat "$RUNNER_TEMP/agent.cost" 2>/dev/null || echo "n/a")"
            echo ""
            echo "**No valid \`<output>\` block, or the agent crashed** — last result text:"
            echo ""
            echo '```'
            tail -n 50 "$RUNNER_TEMP/agent.log" 2>/dev/null || echo "(no log produced)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
