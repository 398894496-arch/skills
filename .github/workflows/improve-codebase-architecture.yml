name: Improve Codebase Architecture

on:
  schedule:
    # 11:17 UTC weekdays = 06:17 CT. Off-the-hour + pre-peak slot to reduce GitHub cron delay.
    - cron: "17 11 * * 1-5"
  workflow_dispatch:

jobs:
  improve-codebase-architecture:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: improve-codebase-architecture
      cancel-in-progress: false
    permissions:
      contents: read
      issues: write

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      LABEL: source:architecture-review

    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 1

      - name: Install Claude Code
        run: |
          set -euo pipefail
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install /improve-codebase-architecture skill
        run: |
          set -euo pipefail
          tmp=$(mktemp -d)
          git clone --depth 1 https://github.com/mattpocock/skills.git "$tmp/mattpocock-skills"
          mkdir -p ~/.claude/skills
          cp -R "$tmp/mattpocock-skills/skills/engineering/improve-codebase-architecture" ~/.claude/skills/
          test -f ~/.claude/skills/improve-codebase-architecture/SKILL.md
          echo "Installed skill from mattpocock/skills@$(git -C "$tmp/mattpocock-skills" rev-parse --short HEAD)"

      - name: Ensure provenance label exists
        run: |
          gh label create "$LABEL" \
            --color "5319E7" \
            --description "Issues proposed by the automated architecture-review workflow" \
            >/dev/null 2>&1 || true

      - name: Run /improve-codebase-architecture
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          # --output-format stream-json --verbose: stream every event to the log so
          # a hung/timed-out run leaves a trace (plain json buffers and goes dark),
          # AND the final result event (with total_cost_usd) reaches the log before
          # claude exits — so cost is captured even on a failed run (#58) and the
          # cross-repo ledger scrapes it. Matches agent-research's 4 workflows.
          # pipefail propagates an agent failure; the cost is already in the log.
          claude -p \
            --output-format stream-json --verbose \
            --permission-mode acceptEdits \
            --allowedTools "Bash(gh:*) Bash(git:*) Read Grep Glob WebSearch WebFetch" \
            --append-system-prompt "$(cat .github/workflows/prompts/improve-codebase-architecture.md)" \
            "Run the daily architecture-review pass. Follow the instructions in the system prompt." \
            | tee "$RUNNER_TEMP/agent.jsonl"
          # Clean step-summary from the saved stream (fromjson? skips any non-JSON
          # line; last result event wins). Best-effort: a failed run already failed
          # the pipe above, and its full trace is in the log.
          jq -rR 'fromjson? | select(.type=="result") | .result // ""' "$RUNNER_TEMP/agent.jsonl" | tail -1 > "$RUNNER_TEMP/agent.log" || true
          jq -rR 'fromjson? | select(.type=="result") | "total_cost_usd=\(.total_cost_usd // "n/a")  duration_ms=\(.duration_ms // "n/a")  num_turns=\(.num_turns // "n/a")"' \
            "$RUNNER_TEMP/agent.jsonl" | tail -1 > "$RUNNER_TEMP/agent.cost" || true

      - name: Summarise run
        if: always()
        run: |
          {
            echo "## Architecture review"
            echo ""
            echo "**Cost:** $(cat "$RUNNER_TEMP/agent.cost" 2>/dev/null || echo "n/a")"
            echo ""
            echo '```'
            tail -n 50 "$RUNNER_TEMP/agent.log" 2>/dev/null || echo "(no log produced)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
