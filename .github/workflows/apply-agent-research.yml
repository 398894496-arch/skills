name: Apply Agent Research

on:
  schedule:
    # 11:37 UTC Mon/Wed/Fri = 06:37 CT. MWF aligns with the upstream non-Twitter
    # capture cadence (agent-research capture.yml) so refreshed mirror knowledge is
    # applied promptly; the loop re-clones the mirror fresh each run and the
    # one-proposal gate keeps each run to ≤1 issue. Off-the-hour to reduce cron delay.
    - cron: "37 11 * * 1,3,5"
  workflow_dispatch:

jobs:
  apply-agent-research:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: apply-agent-research
      cancel-in-progress: false
    permissions:
      contents: read
      issues: write

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      LABEL: source:agent-research
      MIRROR: dividedby/agent-research-knowledge

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Install Claude Code
        run: |
          set -euo pipefail
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Clone the public knowledge mirror (credential-free, read-only)
        run: |
          set -euo pipefail
          git clone --depth 1 "https://github.com/${MIRROR}.git" "$RUNNER_TEMP/knowledge-mirror"
          test -d "$RUNNER_TEMP/knowledge-mirror/knowledge"
          echo "Mirror at $RUNNER_TEMP/knowledge-mirror@$(git -C "$RUNNER_TEMP/knowledge-mirror" rev-parse --short HEAD)"

      - name: Ensure provenance + cross-repo channel labels exist
        run: |
          gh label create "$LABEL" \
            --color "5319E7" \
            --description "Issues proposed by the automated apply-agent-research loop" \
            >/dev/null 2>&1 || true
          # This repo owns the skill-request and skill-promotion labels; Consumers
          # apply them, never create them (fine-grained Issues:write may not cover
          # label creation). See docs/design/skill-request-flow.md and
          # docs/design/skill-promotion-flow.md.
          gh label create "skill-request" \
            --color "0E8A16" \
            --description "Cross-repo demand: a Consumer wants a capability no skill exists for yet (aggregates; see ADR 0006)" \
            >/dev/null 2>&1 || true
          gh label create "skill-promotion" \
            --color "1D76DB" \
            --description "Cross-repo supply: a Consumer offers a local skill it built for adoption (see ADR 0010, skill-promotion-flow.md)" \
            >/dev/null 2>&1 || true

      - name: Run apply-agent-research
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # The portable prompt (ADR 0015) reads its wiring from env. This is the
          # HOST instance, so SKILLS_TRACKER_TOKEN stays UNSET (host mode: drains
          # skill-requests locally, no cross-repo writes) and PRIVATE_MARKERS is
          # empty (this repo is public — the guard's structural checks suffice).
          MIRROR_DIR: ${{ runner.temp }}/knowledge-mirror
          SKILL_DIR: ${{ github.workspace }}/skills/meta/apply-agent-research
          SKILLS_SRC: ${{ github.workspace }}
          PRIVATE_MARKERS: ""
        run: |
          set -euo pipefail
          # Bash stays unscoped: the one-proposal GATE is still invoked via a pipe
          # (echo '<json>' | python3 .../cli.py gate), which a scoped pattern like
          # Bash(python3:*) would block (the command starts with echo), and the
          # agent writes each issue body via a heredoc. The leak GUARD, by contrast,
          # is no longer a standalone step the agent must remember: it is folded into
          # the guarded filing path (cli.py file/comment sanitizes, then shells to gh
          # ONLY on ALLOW). --disallowedTools removes the casual `gh issue create` /
          # `gh issue comment` bypass so filing goes through that guarded path. This
          # is defense-in-depth, not a sandbox (an agent with arbitrary Bash could
          # still subvert it); what it buys is that the *wired* filing path cannot
          # skip the guard — the realistic forgetting-failure. The no-commits/edits
          # invariant holds via contents:read + no Edit/Write, not via Bash scoping.
          # See agent-research#127 (the prior unscoped-Bash rationale, now narrowed).
          # --output-format stream-json --verbose: stream every event to the log so
          # a hung/timed-out run leaves a trace (plain json buffers and goes dark),
          # AND the final result event (with total_cost_usd) reaches the log before
          # claude exits — so cost is captured even on a failed run (#58) and the
          # cross-repo ledger scrapes it. Matches agent-research's 4 workflows.
          # pipefail propagates an agent failure; the cost is already in the log.
          claude -p \
            --output-format stream-json --verbose \
            --permission-mode acceptEdits \
            --allowedTools "Bash Read Grep Glob" \
            --disallowedTools "Bash(gh issue create:*) Bash(gh issue comment:*)" \
            --append-system-prompt "$(cat harness/prompts/apply-agent-research.md)" \
            "Run the scheduled apply-agent-research pass. SKILLS_TRACKER_TOKEN is unset, so this is the HOST instance (host mode). The knowledge mirror is cloned at ${MIRROR_DIR} (read-only), the published-skill catalog + installed-skill snapshot are at ${SKILLS_SRC} (the checkout itself), and the installed skill is at ${SKILL_DIR}. PRIVATE_MARKERS is empty (public repo). Follow the instructions in the system prompt." \
            | tee "$RUNNER_TEMP/agent.jsonl"

      - name: Digest the run (result log + cost ledger)
        if: always()
        run: |
          set -euo pipefail
          # JSONL -> clean result text (the LAST result event's .result, whole, so
          # the agent's multi-line per-channel summary survives) + the total_cost_usd=…
          # ledger line the cross-repo cost hub scrapes. This loop files through the
          # skill's own guarded cli.py, so it does NOT use the harness publish seam —
          # only the shared digest. Best-effort (exit 0 even with no result event),
          # so it runs on a failed agent run too.
          python3 harness/cli.py digest \
            --jsonl "$RUNNER_TEMP/agent.jsonl" \
            --result-out "$RUNNER_TEMP/agent.log" \
            --cost-out "$RUNNER_TEMP/agent.cost"

      - name: Summarise run
        if: always()
        run: |
          {
            echo "## Apply agent research"
            echo ""
            echo "**Cost:** $(cat "$RUNNER_TEMP/agent.cost" 2>/dev/null || echo "n/a")"
            echo ""
            echo '```'
            tail -n 50 "$RUNNER_TEMP/agent.log" 2>/dev/null || echo "(no log produced)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
